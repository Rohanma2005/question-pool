<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login - Question Bank Portal</title>

  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Custom Global CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

  <style>
    body {
      /* Subtle gradient for the login background */
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 15px;
    }

    .login-card {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 20px 48px rgba(0, 0, 0, 0.05);
      border: none;
      padding: 3rem 2.5rem;
    }

    .brand-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: white;
      font-size: 2rem;
      box-shadow: 0 8px 16px rgba(59, 130, 246, 0.25);
    }

    .login-title {
      font-weight: 700;
      color: var(--text-main);
      text-align: center;
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-floating>label {
      color: var(--text-muted);
    }

    .form-control {
      height: 3.5rem;
    }

    .btn-login {
      height: 3.5rem;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-logo">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h4 class="login-title">Welcome Back</h4>
      <p class="login-subtitle">Please sign in to access your portal</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} d-flex align-items-center gap-2">
        <i
          class="bi bi-{{ 'exclamation-circle' if category == 'error' else 'check-circle' }}-fill text-{{ 'danger' if category == 'error' else 'success' }} opacity-75"></i>
        <div>{{ message }}</div>
      </div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="floatingInput" name="email" placeholder="name@example.com"
            required>
          <label for="floatingInput">Email address</label>
        </div>

        <div class="form-floating mb-4">
          <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password"
            required>
          <label for="floatingPassword">Password</label>
        </div>

        <button class="btn btn-primary w-100 btn-login" type="submit">Sign In</button>
      </form>
    </div>
  </div>

</body>

</html>
